<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Flow Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e17; --panel:#111827; --panel2:#0d1520; --border:#1e2d45;
  --accent:#00b4d8; --text:#f0f6ff; --muted:#94a3b8;
  --neg:#e74c3c; --pos:#2ecc71; --neutral:#ffd166;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(0,180,216,.06) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 100%,rgba(167,139,250,.05) 0%,transparent 50%);}
header{padding:24px 40px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;gap:20px;}
.logo-mark{width:4px;height:44px;background:linear-gradient(180deg,#00b4d8,#a78bfa);border-radius:2px;flex-shrink:0;}
h1{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:.08em;line-height:1;color:#fff;}
.subtitle{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px;}
.date-badge{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--muted);margin-left:auto;text-align:right;line-height:1.8;}
.updated{font-size:.6rem;opacity:.6;}
.tabs{padding:0 40px;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;gap:0;}
.tab{font-family:'IBM Plex Mono',monospace;font-size:.68rem;padding:11px 18px;cursor:pointer;
  color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.controls{padding:12px 40px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.ctrl-label{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-right:2px;}
.btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:3px;
  font-family:'IBM Plex Mono',monospace;font-size:.68rem;cursor:pointer;transition:all .15s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
.main{padding:28px 40px;display:flex;flex-direction:column;gap:28px;}
.section-label{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--accent);
  letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;}
.region-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(480px,1fr));gap:18px;}
.region-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.region-card-header{padding:14px 18px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.region-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.region-card-title{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.08em;color:#fff;}
.region-card-date{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted);margin-left:auto;}
.flow-rows{padding:6px 0;}
.flow-row{border-bottom:1px solid rgba(30,45,69,.4);}
.flow-row-header{padding:8px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;}
.flow-row-header:hover{background:rgba(255,255,255,.03);}
.flow-arrow{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--text);flex:1;}
.flow-value{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.04em;}
.flow-value.pos{color:var(--pos);}
.flow-value.neg{color:var(--neg);}
.flow-value.zero{color:var(--muted);}
.flow-direction{font-family:'IBM Plex Mono',monospace;font-size:.6rem;padding:2px 6px;border-radius:2px;}
.flow-direction.out{background:rgba(46,204,113,.12);color:var(--pos);}
.flow-direction.in{background:rgba(231,76,60,.12);color:var(--neg);}
.flow-chevron{font-size:.7rem;color:var(--muted);transition:transform .2s;}
.flow-chevron.open{transform:rotate(90deg);}
.flow-expand{display:none;padding:4px 18px 14px;}
.flow-expand.open{display:block;}
.flow-chart-wrap{height:160px;position:relative;margin-bottom:6px;}
.flow-legend{display:flex;gap:14px;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted);}
.flow-leg-dot{width:8px;height:8px;border-radius:1px;display:inline-block;margin-right:4px;}
.pipeline-section{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.pipeline-section-header{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.sub-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.07em;color:#fff;}
.sub-subtitle{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted);margin-left:6px;}
.pipe-table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:.72rem;}
.pipe-table th{color:var(--muted);text-align:right;padding:7px 14px;border-bottom:1px solid var(--border);
  font-weight:400;letter-spacing:.06em;font-size:.62rem;white-space:nowrap;}
.pipe-table th:first-child{text-align:left;padding-left:18px;}
.pipe-table td{padding:7px 14px;border-bottom:1px solid rgba(30,45,69,.4);text-align:right;color:var(--text);}
.pipe-table td:first-child{text-align:left;padding-left:18px;}
.pipe-table tr.agg-row td{font-weight:600;color:#fff;cursor:pointer;}
.pipe-table tr.agg-row td:first-child::before{content:'▶ ';font-size:.6rem;color:var(--muted);}
.pipe-table tr.agg-row.open td:first-child::before{content:'▼ ';font-size:.6rem;color:var(--accent);}
.pipe-table tr.pipe-row{display:none;}
.pipe-table tr.pipe-row.open{display:table-row;}
.pipe-table tr.pipe-row td{color:#94a3b8;font-size:.68rem;}
.pipe-table tr.pipe-row td:first-child{padding-left:34px;}
.val-pos{color:var(--pos) !important;}
.val-neg{color:var(--neg) !important;}
.val-zero{color:var(--muted);}
</style>
</head>

  <div class="logo-mark"></div>

// ── State ─────────────────────────────────────────────────────────────────────
let currentTab = 'Summary';
let pipeRange  = 30;
let charts     = {};

// ── Helpers ───────────────────────────────────────────────────────────────────
function kill(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }
function killAll() { Object.keys(charts).forEach(kill); }

function hexRgb(hex) {
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:'0,180,216';
}

function fmtDate(d) {
  return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function fmtVal(v) {
  if(v==null||isNaN(v)) return '—';
  return Number(v).toFixed(0);
}

function valClass(v) {
  if(v==null||isNaN(v)||v===0) return 'val-zero';
  return v>0?'val-pos':'val-neg';
}

function filteredDetailDates() {
  if(pipeRange===0) return DETAIL_DATES;
  const last=new Date(DETAIL_DATES[DETAIL_DATES.length-1]+'T00:00:00');
  const cut=new Date(last); cut.setDate(cut.getDate()-pipeRange);
  return DETAIL_DATES.filter(d=>new Date(d+'T00:00:00')>=cut);
}

function statsForSeries(values, allDates) {
  const n = allDates.length;
  const v0 = values[n-1];
  const v1 = values[n-2];
  const v2 = values[n-3];

  const latestDate = new Date(allDates[n-1]+'T00:00:00');
  const dow = latestDate.getDay();
  const daysSinceMon = (dow===0)?6:(dow-1);
  const wtdVals = values.slice(Math.max(0,n-1-daysSinceMon));
  const wtd = wtdVals.filter(x=>x!=null).reduce((a,b)=>a+b,0)/Math.max(1,wtdVals.filter(x=>x!=null).length);

  const curMon = allDates[n-1].slice(0,7);
  const mtdIdxs = allDates.map((d,i)=>d.slice(0,7)===curMon?i:-1).filter(i=>i>=0);
  const mtdVals = mtdIdxs.map(i=>values[i]).filter(x=>x!=null);
  const mtd = mtdVals.reduce((a,b)=>a+b,0)/Math.max(1,mtdVals.length);

  const curYr = allDates[n-1].slice(0,4);
  const ytdIdxs = allDates.map((d,i)=>d.slice(0,4)===curYr?i:-1).filter(i=>i>=0);
  const ytdVals = ytdIdxs.map(i=>values[i]).filter(x=>x!=null);
  const ytd = ytdVals.reduce((a,b)=>a+b,0)/Math.max(1,ytdVals.length);

  return {v0,v1,v2,wtd,mtd,ytd};
}

// ── Summary tab ───────────────────────────────────────────────────────────────
function renderSummary() {
  document.getElementById('controlsBar').style.display='none';

  const latest = SUMMARY_DATES[SUMMARY_DATES.length-1];
  document.getElementById('headerDateRange').textContent =
    SUMMARY_DATES[0] + '  →  ' + latest;

  let html = `<div class="section-label">// Net Inter-Region Flows by Region — ${fmtDate(latest)}</div>
  <div class="region-grid" id="regionGrid"></div>`;
  document.getElementById('mainContent').innerHTML = html;

  REGION_NAMES.forEach(rname => {
    const meta   = REGION_META[rname];
    const rid    = meta.id;
    const color  = meta.color;
    const latest_info = LATEST_SUMMARY[String(rid)] || {};
    const latDate = latest_info.date || '—';
    const flows   = latest_info.flows || {};
    const flowNames = Object.keys(flows).sort();

    if(!flowNames.length) return;

    let rowsHtml = '';
    flowNames.forEach((fname, fi) => {
      const v       = flows[fname];
      const vClass  = v>0?'pos':v<0?'neg':'zero';
      const dirLabel= v>0?'<span class="flow-direction out">OUT</span>':'<span class="flow-direction in">IN</span>';
      const chartId = `sumChart_${rid}_${fi}`;
      rowsHtml += `
      <div class="flow-row">
        <div class="flow-row-header" onclick="toggleFlowRow(this, '${chartId}', ${rid}, '${fname}')">
          <span class="flow-arrow">${fname}</span>
          ${dirLabel}
          <span class="flow-value ${vClass}">${fmtVal(v)}</span>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--muted);margin-left:4px">MMcf/d</span>
          <span class="flow-chevron">›</span>
        </div>
        <div class="flow-expand" id="exp_${chartId}">
          <div class="flow-chart-wrap"><canvas id="${chartId}"></canvas></div>
          <div class="flow-legend">
            <span><span class="flow-leg-dot" style="background:rgba(46,204,113,0.8)"></span>Outflow (pos)</span>
            <span><span class="flow-leg-dot" style="background:rgba(231,76,60,0.8)"></span>Inflow (neg)</span>
            <span><span class="flow-leg-dot" style="background:${color}"></span>Net</span>
          </div>
        </div>
      </div>`;
    });

    const card = document.createElement('div');
    card.className = 'region-card';
    card.style.borderTop = `2px solid ${color}`;
    card.innerHTML = `
      <div class="region-card-header">
        <div class="region-dot" style="background:${color}"></div>
        <div class="region-card-title">${rname}</div>
        <div class="region-card-date">${fmtDate(latDate)}</div>
      </div>
      <div class="flow-rows">${rowsHtml}</div>`;
    document.getElementById('regionGrid').appendChild(card);
  });
}

function toggleFlowRow(headerEl, chartId, rid, fname) {
  const chevron = headerEl.querySelector('.flow-chevron');
  const expDiv  = document.getElementById('exp_'+chartId);
  const isOpen  = expDiv.classList.contains('open');

  if(isOpen) {
    expDiv.classList.remove('open');
    chevron.classList.remove('open');
    kill(chartId);
  } else {
    expDiv.classList.add('open');
    chevron.classList.add('open');
    buildSummaryChart(chartId, rid, fname);
  }
}

function buildSummaryChart(chartId, rid, fname) {
  kill(chartId);
  const ctx = document.getElementById(chartId); if(!ctx) return;
  const series = (SUMMARY_SERIES[String(rid)] || {})[fname] || [];
  const labels = series.map(p => fmtDate(p.d));
  const values = series.map(p => p.v);
  const color  = REGION_META[REGION_NAMES.find(n=>REGION_META[n].id===rid)]?.color || '#00b4d8';

  const outVals = values.map(v => v!=null&&v>0 ? v : 0);
  const inVals  = values.map(v => v!=null&&v<0 ? v : 0);

  charts[chartId] = new Chart(ctx.getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Outflow', data:outVals, backgroundColor:'rgba(46,204,113,0.75)', borderColor:'#2ecc71', borderWidth:0, barPercentage:0.9, categoryPercentage:0.9 },
        { label:'Inflow',  data:inVals,  backgroundColor:'rgba(231,76,60,0.75)',  borderColor:'#e74c3c', borderWidth:0, barPercentage:0.9, categoryPercentage:0.9 },
        { label:'Net', data:values, type:'line', borderColor:color, backgroundColor:'transparent',
           borderWidth:2, pointRadius:2, pointHoverRadius:4, tension:0.3, order:0 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      scales:{
        x:{stacked:true,grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{family:'IBM Plex Mono',size:9},maxTicksLimit:10},border:{display:false}},
        y:{stacked:true,
          grid:{color:(c)=>c.tick.value===0?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.04)'},
          ticks:{color:'#64748b',font:{family:'IBM Plex Mono',size:9},callback:v=>v.toFixed(0)},border:{display:false}}
      },
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:'#0d1420',borderColor:'#1e2d45',borderWidth:1,
          titleFont:{family:'IBM Plex Mono',size:10},bodyFont:{family:'IBM Plex Mono',size:10},
          callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y!=null?c.parsed.y.toFixed(0):0} MMcf/d`}}
      }
    }
  });
}

// ── Region tab ────────────────────────────────────────────────────────────────
function renderRegion(rname) {
  document.getElementById('controlsBar').style.display='flex';
  document.getElementById('headerDateRange').textContent =
    DETAIL_DATES[0] + '  →  ' + DETAIL_DATES[DETAIL_DATES.length-1];

  const meta    = REGION_META[rname];
  const color   = meta.color;
  const regData = PIPELINE_DATA[rname] || {};
  const dates   = filteredDetailDates();
  const allDates = DETAIL_DATES;

  let html = `<div class="section-label">// ${rname} — Pipeline Flows by Subregion</div>`;

  const subregions = Object.keys(regData).sort();
  if(!subregions.length) {
    html += `<div style="color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.8rem;padding:20px 0;">No pipeline data available for this region.</div>`;
    document.getElementById('mainContent').innerHTML = html;
    return;
  }

  subregions.forEach(subPov => {
    const groups     = regData[subPov];
    const groupNames = Object.keys(groups).sort();

    const n = allDates.length;
    const d0 = allDates[n-1], d1 = allDates[n-2]||d0, d2 = allDates[n-3]||d1;

    let tableRows = '';
    groupNames.forEach((grp, gi) => {
      const gdata    = groups[grp];
      const totals   = gdata.totals;
      const pipes    = gdata.pipes;
      const pipeNames = Object.keys(pipes).sort();
      const aggId    = `agg_${rname}_${subPov}_${gi}`.replace(/[^a-z0-9_]/gi,'_');

      const stats = statsForSeries(totals, allDates);
      const v0=stats.v0,v1=stats.v1,v2=stats.v2,wtd=stats.wtd,mtd=stats.mtd,ytd=stats.ytd;
      const flow_label = v0>0 ? `${subPov} → ${grp}` : `${subPov} ← ${grp}`;

      tableRows += `<tr class="agg-row" id="${aggId}" onclick="toggleAggRow('${aggId}','${grp}')">
        <td>${flow_label}</td>
        <td class="${valClass(v0)}">${fmtVal(v0)}</td>
        <td class="${valClass(v1)}">${fmtVal(v1)}</td>
        <td class="${valClass(v2)}">${fmtVal(v2)}</td>
        <td class="${valClass(wtd)}">${fmtVal(wtd)}</td>
        <td class="${valClass(mtd)}">${fmtVal(mtd)}</td>
        <td class="${valClass(ytd)}">${fmtVal(ytd)}</td>
      </tr>`;

      pipeNames.forEach(pname => {
        const pvals  = pipes[pname];
        const pstats = statsForSeries(pvals, allDates);
        const pr = `pipe_${aggId}_${pname}`.replace(/[^a-z0-9_]/gi,'_');
        tableRows += `<tr class="pipe-row" data-agg="${aggId}" id="${pr}">
          <td>${pname}</td>
          <td class="${valClass(pstats.v0)}">${fmtVal(pstats.v0)}</td>
          <td class="${valClass(pstats.v1)}">${fmtVal(pstats.v1)}</td>
          <td class="${valClass(pstats.v2)}">${fmtVal(pstats.v2)}</td>
          <td class="${valClass(pstats.wtd)}">${fmtVal(pstats.wtd)}</td>
          <td class="${valClass(pstats.mtd)}">${fmtVal(pstats.mtd)}</td>
          <td class="${valClass(pstats.ytd)}">${fmtVal(pstats.ytd)}</td>
        </tr>`;
      });
    });

    const d0f=fmtDate(d0), d1f=fmtDate(d1), d2f=fmtDate(d2);
    html += `
    <div class="pipeline-section" style="border-top:2px solid ${color}">
      <div class="pipeline-section-header">
        <div class="region-dot" style="background:${color}"></div>
        <div class="sub-title">${subPov}</div>
        <div class="sub-subtitle">${rname} subregion — MMcf/d · click row to expand pipelines</div>
      </div>
      <div style="overflow-x:auto;">
        <table class="pipe-table">
          <thead><tr>
            <th>Flow</th>
            <th>${d0f}</th><th>${d1f}</th><th>${d2f}</th>
            <th>WTD Avg</th><th>MTD Avg</th><th>YTD Avg</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>`;
  });

  document.getElementById('mainContent').innerHTML = html;
}

function toggleAggRow(aggId, grp) {
  const aggRow  = document.getElementById(aggId);
  const isOpen  = aggRow.classList.contains('open');
  const pipeRows = document.querySelectorAll(`tr.pipe-row[data-agg="${aggId}"]`);
  if(isOpen) {
    aggRow.classList.remove('open');
    pipeRows.forEach(r => r.classList.remove('open'));
  } else {
    aggRow.classList.add('open');
    pipeRows.forEach(r => r.classList.add('open'));
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  ['Summary', ...REGION_NAMES].forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (t===currentTab?' active':'');
    if(t!=='Summary') {
      el.style.borderBottomColor = currentTab===t ? REGION_META[t]?.color||'var(--accent)' : 'transparent';
      el.style.color = currentTab===t ? REGION_META[t]?.color||'var(--accent)' : '';
    }
    el.textContent = t;
    el.onclick = () => { currentTab=t; killAll(); buildTabs(); render(); };
    bar.appendChild(el);
  });
}

function render() {
  killAll();
  if(currentTab==='Summary') renderSummary();
  else renderRegion(currentTab);
}

function setRange(r) {
  pipeRange = r;
  [30,90,0].forEach(x=>document.getElementById('btn-'+x)?.classList.toggle('active',x===r));
  if(currentTab!=='Summary') render();
}

buildTabs();
render();
</script>
</body>
</html>
