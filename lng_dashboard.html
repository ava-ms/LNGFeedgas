<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US LNG Feedgas Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
:root {
  --bg:#0a0e14; --surface:#111620; --border:#1e2a3a;
  --accent:#00d4ff; --text:#c8d8e8; --muted:#4a5f75;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;padding:24px;}
header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}
h1{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:3px;color:#fff;line-height:1;}
h1 span{color:var(--accent);}
.meta{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--muted);text-align:right;line-height:1.8;}
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.controls label{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
select,input[type=date]{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:0.75rem;padding:6px 10px;border-radius:4px;cursor:pointer;outline:none;}
select:hover,input[type=date]:hover{border-color:var(--accent);}
.btn{background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:0.7rem;padding:6px 14px;border-radius:4px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .15s;}
.btn:hover{background:var(--accent);color:#000;}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.stat{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:6px;padding:12px 14px;}
.stat-label{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff;letter-spacing:1px;}
.stat-sub{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--muted);margin-top:2px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:20px;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:#fff;margin-bottom:2px;display:flex;align-items:center;gap:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;flex-shrink:0;}
.card-sub{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:14px;}
.total-wrap{height:300px;position:relative;}
.fac-wrap{height:180px;position:relative;}
.section-hdr{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:3px;color:#fff;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.section-hdr span{color:var(--accent);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:860px){.grid{grid-template-columns:1fr;}}
.fac-label{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--muted);margin-top:6px;}
</style>
</head>
<body>
<header>
  <div>
    <h1>US LNG <span>Feedgas</span> Dashboard</h1>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--muted);margin-top:4px;">S&P GLOBAL POINTLOGIC &nbsp;·&nbsp; FACILITY-LEVEL FLOWS &nbsp;·&nbsp; MMcf/d</div>
  </div>
  <div class="meta">SOURCE: S&amp;P GLOBAL POINTLOGIC<br>PERIOD: JAN 2025 – MAR 2026<br>UPDATED: MARCH 10, 2026</div>
</header>

<div class="controls">

  <label>To&nbsp;</label>

  <button class="btn" onclick="resetDates()">Reset</button>
</div>

<div class="stats-bar" id="statsBar"></div>

    const out = [...values];
    Object.values(monthly).forEach(({sum,cnt,indices}) => {
      const avg = sum/cnt;
      indices.forEach(i => out[i]=avg);
    });
    return out;
  }
  return values;
}

function resetDates() {
  document.getElementById('dateFrom').value = '2025-01-01';
  document.getElementById('dateTo').value = '2026-03-10';
  render();
}

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  animation: false,
  plugins: {
    legend: { display: false },
    tooltip: {
      mode: 'index',
      intersect: false,
      backgroundColor: '#111620',
      borderColor: '#1e2a3a',
      borderWidth: 1,
      titleColor: '#c8d8e8',
      bodyColor: '#c8d8e8',
      titleFont: { family: 'IBM Plex Mono', size: 11 },
      bodyFont: { family: 'IBM Plex Mono', size: 11 },
      callbacks: {
        label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(0)} MMcf/d`
      }
    }
  },
  scales: {
    x: {
      ticks: {
        color: '#4a5f75',
        font: { family: 'IBM Plex Mono', size: 9 },
        maxTicksLimit: 12,
        maxRotation: 0
      },
      grid: { color: '#151f2b' },
      border: { color: '#1e2a3a' }
    },
    y: {
      ticks: {
        color: '#4a5f75',
        font: { family: 'IBM Plex Mono', size: 9 },
        callback: v => v.toLocaleString()
      },
      grid: { color: '#151f2b' },
      border: { color: '#1e2a3a' }
    }
  }
};

function buildStats(indices) {
  const mode = document.getElementById('viewMode').value;
  const totals = applyView(CHART_DATA.total, mode);
  const subset = indices.map(i => totals[i]);
  const avg = subset.reduce((a,b)=>a+b,0)/subset.length;
  const max = Math.max(...subset);
  const min = Math.min(...subset);
  const maxDate = CHART_DATA.dates[indices[subset.indexOf(max)]];
  const latest = totals[indices[indices.length-1]];

  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat">
      <div class="stat-label">Latest (Mar 10)</div>
      <div class="stat-value">${latest.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</div>
      <div class="stat-sub">MMcf/d total feedgas</div>
    </div>
    <div class="stat">
      <div class="stat-label">Period Avg</div>
      <div class="stat-value">${avg.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</div>
      <div class="stat-sub">MMcf/d</div>
    </div>
    <div class="stat">
      <div class="stat-label">Period Peak</div>
      <div class="stat-value">${max.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</div>
      <div class="stat-sub">${maxDate}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Period Low</div>
      <div class="stat-value">${min.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}</div>
      <div class="stat-sub">MMcf/d</div>
    </div>
    <div class="stat">
      <div class="stat-label">Active Facilities</div>
      <div class="stat-value">9</div>
      <div class="stat-sub">incl. Golden Pass (new)</div>
    </div>
  `;
}

function render() {
  const indices = getFilteredIndices();
  const mode = document.getElementById('viewMode').value;
  const labels = indices.map(i => CHART_DATA.dates[i]);

  buildStats(indices);

  // --- TOTAL STACKED CHART ---
  const stackedDatasets = CHART_DATA.facilities.map(fac => {
    const raw = indices.map(i => CHART_DATA.byFacility[fac][i]);
    const processed = applyView(CHART_DATA.byFacility[fac], mode).filter((_,i2) => indices.includes(i2));
    const color = FAC_COLORS[fac];
    return {
      label: fac,
      data: applyView(CHART_DATA.byFacility[fac], mode).map((v,i2) => indices.includes(i2) ? v : null).filter(v => v!==null),
      backgroundColor: color + 'cc',
      borderColor: color,
      borderWidth: 0,
      fill: true,
      pointRadius: 0,
      tension: 0.3
    };
  });

  // Recalc to get correct subset
  const cleanDatasets = CHART_DATA.facilities.map(fac => {
    const allVals = applyView(CHART_DATA.byFacility[fac], mode);
    return {
      label: fac,
      data: indices.map(i => allVals[i]),
      backgroundColor: FAC_COLORS[fac] + 'cc',
      borderColor: FAC_COLORS[fac],
      borderWidth: 0,
      pointRadius: 0,
      tension: 0.3
    };
  });

  if(totalChart) {
    totalChart.data.labels = labels;
    totalChart.data.datasets = cleanDatasets;
    totalChart.update('none');
  } else {
    totalChart = new Chart(document.getElementById('totalChart'), {
      type: 'bar',
      data: { labels, datasets: cleanDatasets },
      options: {
        ...CHART_DEFAULTS,
        plugins: {
          ...CHART_DEFAULTS.plugins,
          legend: {
            display: true,
            position: 'bottom',
            labels: {
              color: '#c8d8e8',
              font: { family: 'IBM Plex Mono', size: 9 },
              boxWidth: 10,
              padding: 10
            }
          }
        },
        scales: {
          ...CHART_DEFAULTS.scales,
          x: { ...CHART_DEFAULTS.scales.x, stacked: true },
          y: { ...CHART_DEFAULTS.scales.y, stacked: true,
            ticks: { ...CHART_DEFAULTS.scales.y.ticks, callback: v => (v/1000).toFixed(0)+'k' }
          }
        }
      }
    });
  }

  // --- FACILITY CHARTS ---
  const grid = document.getElementById('facGrid');
  if(!grid.children.length) {
    CHART_DATA.facilities.forEach(fac => {
      const card = document.createElement('div');
      card.className = 'card';
      const color = FAC_COLORS[fac];
      card.style.borderLeftColor = color;
      card.style.borderLeftWidth = '3px';
      card.innerHTML = `
        <div class="card-title"><span class="dot" style="background:${color}"></span>${fac.toUpperCase()}</div>
        <div class="card-sub" id="sub_${fac.replace(/\s/g,'_')}">loading...</div>
        <div class="fac-wrap"><canvas id="fac_${fac.replace(/\s/g,'_')}"></canvas></div>
      `;
      grid.appendChild(card);
    });
  }

  CHART_DATA.facilities.forEach(fac => {
    const key = fac.replace(/\s/g,'_');
    const allVals = applyView(CHART_DATA.byFacility[fac], mode);
    const vals = indices.map(i => allVals[i]);
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    const latest2 = vals[vals.length-1];
    const color = FAC_COLORS[fac];

    document.getElementById('sub_'+key).textContent =
      `Avg: ${avg.toFixed(0)} MMcf/d  ·  Latest: ${latest2.toFixed(0)} MMcf/d`;

    const canvas = document.getElementById('fac_'+key);
    if(facCharts[fac]) {
      facCharts[fac].data.labels = labels;
      facCharts[fac].data.datasets[0].data = vals;
      facCharts[fac].update('none');
    } else {
      facCharts[fac] = new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: fac,
            data: vals,
            borderColor: color,
            backgroundColor: color + '22',
            borderWidth: 1.5,
            pointRadius: 0,
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          ...CHART_DEFAULTS,
          scales: {
            x: { ...CHART_DEFAULTS.scales.x },
            y: { ...CHART_DEFAULTS.scales.y, beginAtZero: true }
          }
        }
      });
    }
  });
}

render();
</script>
</body>
</html>
