<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regional Gas Flows Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e17; --panel:#111827; --border:#1e2d45;
    --accent:#a78bfa; --text:#e2e8f0; --muted:#64748b;
    --neg:#e74c3c; --pos:#2ecc71;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 0%,rgba(167,139,250,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 100%,rgba(0,180,216,.05) 0%,transparent 50%);}
  header{padding:28px 40px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;gap:20px;}
  .logo-mark{width:4px;height:44px;background:linear-gradient(180deg,#a78bfa,#00d4ff);border-radius:2px;flex-shrink:0;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;letter-spacing:.08em;line-height:1;color:#fff;}
  .subtitle{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px;}
  .date-badge{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--muted);margin-left:auto;text-align:right;line-height:1.8;}
  .updated{font-size:.6rem;color:var(--muted);opacity:.6;}
  .controls{padding:14px 40px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .ctrl-label{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-right:2px;}
  .btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 13px;border-radius:3px;
    font-family:'IBM Plex Mono',monospace;font-size:.68rem;cursor:pointer;transition:all .15s;letter-spacing:.05em;}
  .btn:hover{border-color:var(--accent);color:var(--accent);}
  .btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
  .tabs{padding:0 40px;border-bottom:1px solid var(--border);display:flex;gap:0;overflow-x:auto;}
  .tab{font-family:'IBM Plex Mono',monospace;font-size:.68rem;padding:10px 16px;cursor:pointer;
    color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .main{padding:28px 40px;display:flex;flex-direction:column;gap:32px;}
  .section-label{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:22px;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
  .card-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.08em;color:#fff;margin-bottom:2px;}
  .card-sub{font-size:.72rem;color:var(--muted);margin-bottom:16px;}
  .legend{display:flex;flex-wrap:wrap;gap:10px 20px;margin-bottom:14px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--text);cursor:pointer;transition:opacity .2s;}
  .legend-item.hidden{opacity:.3;}
  .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
  .chart-tall{height:360px;position:relative;}
  .chart-med{height:220px;position:relative;}
  .chart-sm{height:160px;position:relative;}
  .stats-table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:.72rem;}
  .stats-table th{color:var(--muted);text-align:right;padding:7px 14px;border-bottom:1px solid var(--border);font-weight:400;letter-spacing:.06em;font-size:.62rem;white-space:nowrap;}
  .stats-table th:first-child{text-align:left;}
  .stats-table td{padding:7px 14px;border-bottom:1px solid rgba(30,45,69,.4);text-align:right;color:var(--text);}
  .stats-table td:first-child{text-align:left;}
  .stats-table tr.total-row td{color:#fff;font-weight:600;border-top:1px solid var(--border);background:rgba(255,255,255,.02);}
  .neg{color:var(--neg) !important;}
  .pos{color:var(--pos) !important;}
  .flow-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:18px;}
  .flow-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:18px;position:relative;overflow:hidden;}
  .flow-title{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.07em;color:#fff;margin-bottom:3px;}
  .flow-meta{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:var(--muted);margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap;align-items:baseline;}
  .flow-latest{font-size:1.15rem;font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  @media(max-width:900px){.two-col{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <div class="logo-mark"></div>
  <div>
    <div class="subtitle">S&P Global PointLogic</div>
    <h1>Regional Gas Flows Dashboard</h1>
  </div>
  <div class="date-badge">
    <div>2025-01-01  →  2025-04-07</div>
    <div class="updated">Updated March 11, 2026 at 09:05 AM</div>
  </div>
</header>

<div class="controls">
  <span class="ctrl-label">View:</span>
  <button class="btn active" id="btn-daily"   onclick="setView('daily')">Daily</button>
  <button class="btn"        id="btn-weekly"  onclick="setView('weekly')">7-Day Avg</button>
  <button class="btn"        id="btn-monthly" onclick="setView('monthly')">Monthly</button>
  <span class="ctrl-label" style="margin-left:16px">Range:</span>
  <button class="btn"        id="btn-30"  onclick="setRange(30)">30D</button>
  <button class="btn active" id="btn-180" onclick="setRange(180)">180D</button>
  <button class="btn"        id="btn-0"   onclick="setRange(0)">All</button>
</div>

<div class="tabs" id="tabBar"></div>
<div class="main" id="mainContent"></div>

// ── State ─────────────────────────────────────────────────────────────────────
let view = 'daily', range = 180, tab = 'Summary';
let hiddenOrigins = new Set();
let charts = {};

// ── Core helpers ──────────────────────────────────────────────────────────────
function filteredDates() {
  if (range === 0) return ALL_DATES;
  const last = new Date(ALL_DATES[ALL_DATES.length-1]+'T00:00:00');
  const cut  = new Date(last); cut.setDate(cut.getDate()-range);
  return ALL_DATES.filter(d => new Date(d+'T00:00:00') >= cut);
}

function aggregate(series, dates) {
  const map = {};
  series.forEach(r => map[r.d] = r.v);
  const raw = dates.map(d => map[d] ?? null);
  if (view === 'daily') return {labels:dates, values:raw};
  if (view === 'weekly') {
    const out=[], lbls=[];
    for (let i=6;i<dates.length;i++) {
      const w=raw.slice(i-6,i+1).filter(v=>v!=null);
      out.push(w.length?w.reduce((a,b)=>a+b,0)/w.length:null); lbls.push(dates[i]);
    }
    return {labels:lbls,values:out};
  }
  const mon={};
  dates.forEach((d,i)=>{ const k=d.slice(0,7); if(!mon[k])mon[k]=[]; if(raw[i]!=null)mon[k].push(raw[i]); });
  const lbls=Object.keys(mon).sort();
  return {labels:lbls, values:lbls.map(k=>mon[k].length?mon[k].reduce((a,b)=>a+b,0)/mon[k].length:null)};
}

function fmtL(d) {
  if (view==='monthly') { const [y,m]=d.split('-'); return new Date(y,m-1).toLocaleString('default',{month:'short',year:'2-digit'}); }
  return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function fmtV(v) { return v==null?'—':Number(v).toFixed(0); }

function kill(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }
function killAll(prefix='') { Object.keys(charts).filter(id=>id.startsWith(prefix)).forEach(kill); }

function hexRgb(hex) {
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:'167,139,250';
}

const BASE = {
  responsive:true, maintainAspectRatio:false,
  interaction:{mode:'index',intersect:false},
  plugins:{
    legend:{display:false},
    tooltip:{backgroundColor:'#0d1420',borderColor:'#1e2d45',borderWidth:1,
      titleFont:{family:'IBM Plex Mono',size:10},bodyFont:{family:'IBM Plex Mono',size:10}}
  },
  scales:{
    x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#64748b',font:{family:'IBM Plex Mono',size:9},maxTicksLimit:12},border:{display:false}},
    y:{grid:{color:(c)=>c.tick.value===0?'rgba(255,255,255,0.18)':'rgba(255,255,255,0.04)'},
        ticks:{color:'#64748b',font:{family:'IBM Plex Mono',size:9},callback:v=>v.toFixed(0)},border:{display:false}}
  }
};

// ── Flow bar chart (red if negative) ──────────────────────────────────────────
function flowBar(id, series, color, dates) {
  kill(id);
  const el = document.getElementById(id); if(!el) return;
  const {labels,values} = aggregate(series, dates);
  const bg  = values.map(v=>(v!=null&&v<0)?'rgba(231,76,60,0.75)':`rgba(${hexRgb(color)},0.72)`);
  const bdr = values.map(v=>(v!=null&&v<0)?'#e74c3c':color);
  charts[id] = new Chart(el.getContext('2d'), {
    type:'bar',
    data:{labels:labels.map(fmtL), datasets:[{data:values,backgroundColor:bg,borderColor:bdr,borderWidth:1,barPercentage:0.95,categoryPercentage:0.95}]},
    options:{...BASE, plugins:{...BASE.plugins,tooltip:{...BASE.plugins.tooltip,
      callbacks:{label:c=>` ${c.parsed.y!=null?c.parsed.y.toFixed(1):0} MMcf/d`}}}}
  });
}

// ── Stacked bar (summary) ─────────────────────────────────────────────────────
function stackedBar(id, dates) {
  kill(id);
  const el = document.getElementById(id); if(!el) return;
  const {labels} = aggregate(ORIGIN_TOTALS[TAB_ORIGINS[0]], dates);
  const datasets = TAB_ORIGINS.filter(o=>!hiddenOrigins.has(o)).map(o=>{
    const {values} = aggregate(ORIGIN_TOTALS[o], dates);
    return {label:o,data:values,backgroundColor:ORIGIN_COLORS[o]||'#888',borderColor:'transparent',borderWidth:0,barPercentage:1,categoryPercentage:0.92};
  });
  charts[id] = new Chart(el.getContext('2d'), {
    type:'bar',
    data:{labels:labels.map(fmtL),datasets},
    options:{...BASE,
      scales:{x:{...BASE.scales.x,stacked:true},y:{...BASE.scales.y,stacked:true}},
      plugins:{...BASE.plugins,tooltip:{...BASE.plugins.tooltip,
        callbacks:{
          label:c=>` ${c.dataset.label}: ${c.parsed.y!=null?c.parsed.y.toFixed(0):0} MMcf/d`,
          footer:items=>`Net: ${items.reduce((s,i)=>s+(i.parsed.y||0),0).toFixed(0)} MMcf/d`
        }}}}
  });
}

// ── Stats table ───────────────────────────────────────────────────────────────
function statsTable(rowDefs) {
  const d0 = ALL_DATES[ALL_DATES.length-1];
  const d1 = ALL_DATES[ALL_DATES.length-2]||d0;
  const d2 = ALL_DATES[ALL_DATES.length-3]||d1;
  const mon = d0.slice(0,7), yr = d0.slice(0,4);

  function sm(s){ const m={}; s.forEach(r=>m[r.d]=r.v); return m; }
  function avg(s,fn){
    const m=sm(s); const vals=ALL_DATES.filter(fn).map(d=>m[d]||0);
    return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  }
  function td(v){
    if(v==null) return '<td>—</td>';
    const cls=v<0?' class="neg"':v>0?' class="pos"':'';
    return `<td${cls}>${Number(v).toFixed(0)}</td>`;
  }

  const f0=new Date(d0+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const f1=new Date(d1+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const f2=new Date(d2+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});

  let h=`<table class="stats-table"><thead><tr>
    <th>Flow</th><th>${f0}</th><th>${f1}</th><th>${f2}</th>
    <th>7-Day Avg</th><th>MtD Avg</th><th>YtD Avg</th><th>2025 Avg</th>
  </tr></thead><tbody>`;

  rowDefs.forEach(row=>{
    const m=sm(row.series);
    const v0=m[d0]??null, v1=m[d1]??null, v2=m[d2]??null;
    const a7=avg(row.series,d=>ALL_DATES.slice(-7).includes(d));
    const mtd=avg(row.series,d=>d.slice(0,7)===mon);
    const ytd=avg(row.series,d=>d.slice(0,4)===yr);
    const y25=avg(row.series,d=>d.slice(0,4)==='2025');
    const cls=row.isTotal?' class="total-row"':'';
    h+=`<tr${cls}><td>${row.label}</td>${td(v0)}${td(v1)}${td(v2)}${td(a7)}${td(mtd)}${td(ytd)}${td(y25)}</tr>`;
  });
  return h+'</tbody></table>';
}

// ── Legend ────────────────────────────────────────────────────────────────────
function buildLegend(id) {
  const el=document.getElementById(id); if(!el) return;
  el.innerHTML='';
  TAB_ORIGINS.forEach(o=>{
    const item=document.createElement('div');
    item.className='legend-item'+(hiddenOrigins.has(o)?' hidden':'');
    item.innerHTML=`<div class="legend-dot" style="background:${ORIGIN_COLORS[o]||'#888'}"></div>${o}`;
    item.onclick=()=>{hiddenOrigins.has(o)?hiddenOrigins.delete(o):hiddenOrigins.add(o);render();};
    el.appendChild(item);
  });
}

      <div class="section-label">// Net Inter-Region Outflows — All Origins Stacked</div>
      <div class="card">
        <div class="card-title">All Major Region Flows</div>
        <div class="card-sub">MMcf/d · Negative stacks = net inflow to that origin · Click legend to toggle</div>
        <div class="legend" id="sumLeg"></div>
        <div class="chart-tall"><canvas id="sumChart"></canvas></div>
      </div>
    </div>
    <div>
      <div class="section-label">// All Inter-Region Flow Statistics (MMcf/d)</div>
      <div class="card" style="padding:0;overflow:auto;">${statsTable(rowDefs)}</div>
    </div>`;

  buildLegend('sumLeg');
  stackedBar('sumChart', dates);
}

// ── Region tab ────────────────────────────────────────────────────────────────
function renderOrigin(origin) {
  const dates  = filteredDates();
  const color  = ORIGIN_COLORS[origin]||'#a78bfa';
  const dests  = Object.keys(TO_FLOWS[origin]||{});
  const subs   = Object.keys(SUB_FLOWS[origin]||{});

  const toRowDefs = dests.map(d=>({
    label:`${origin} → ${d}`, series:(TO_FLOWS[origin]||{})[d]||[], isTotal:false
  }));

  document.getElementById('mainContent').innerHTML=`
    <div>
      <div class="section-label">// ${origin} — Total Net Outflow (sum of all destinations)</div>
      <div class="card">
        <div class="card-title">${origin} Net Outflow</div>
        <div class="card-sub">MMcf/d · Red = day when more gas flowed in than out</div>
        <div class="chart-med"><canvas id="originTotal"></canvas></div>
      </div>
    </div>
    <div>
      <div class="section-label">// ${origin} Point of View — Flowing To Each Region</div>
      <div class="flow-grid" id="toGrid"></div>
    </div>
    <div id="statsSection"></div>
    <div id="subSection"></div>`;

  if(toRowDefs.length) {
    document.getElementById('statsSection').innerHTML=`
    <div>
      <div class="section-label">// Flow Statistics — ${origin} as Origin (MMcf/d)</div>
      <div class="card" style="padding:0;overflow:auto;">${statsTable(toRowDefs)}</div>
    </div>`;
  }
  if(subs.length) {
    document.getElementById('subSection').innerHTML=`
    <div>
      <div class="section-label">// ${origin} Subregion Flows</div>
      <div class="flow-grid" id="subGrid"></div>
    </div>`;
  }

  flowBar('originTotal', ORIGIN_TOTALS[origin]||[], color, dates);
  buildToCards(origin, dests, color, dates);
  if(subs.length) buildSubCards(origin, subs, color, dates);
}

function flowCard(containerId, id, title, series, color, dates, isAmp) {
  const el = document.getElementById(containerId); if(!el) return;
  const map={}; series.forEach(r=>map[r.d]=r.v);
  const latest = ALL_DATES[ALL_DATES.length-1];
  const latVal = map[latest]??null;
  const vals   = ALL_DATES.map(d=>map[d]??null).filter(v=>v!=null);
  const avgVal = vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  const isNeg  = latVal!=null&&latVal<0;
  const latStr = latVal!=null?latVal.toFixed(0)+' MMcf/d':'—';
  const badge  = isAmp?'<span style="font-size:.6rem;color:var(--muted);margin-left:6px">bidirectional</span>':'';

  const card=document.createElement('div');
  card.className='flow-card';
  card.innerHTML=`
    <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${color}"></div>
    <div class="flow-title">${title}${badge}</div>
    <div class="flow-meta">
      <span class="flow-latest ${isNeg?'neg':'pos'}">${latStr}</span>
      <span>Avg ${avgVal.toFixed(0)} MMcf/d</span>
    </div>
    <div class="chart-sm"><canvas id="${id}"></canvas></div>`;
  el.appendChild(card);
  flowBar(id, series, color, dates);
}

function buildToCards(origin, dests, color, dates) {
  killAll('to_');
  const grid=document.getElementById('toGrid'); if(!grid) return;
  grid.innerHTML='';
  dests.forEach(dest=>{
    const series=(TO_FLOWS[origin]||{})[dest]||[];
    const id='to_'+(origin+'_'+dest).replace(/[^a-z0-9]/gi,'_');
    flowCard('toGrid',id,`${origin} → ${dest}`,series,color,dates,false);
  });
}

function buildSubCards(origin, subs, color, dates) {
  killAll('sub_');
  const grid=document.getElementById('subGrid'); if(!grid) return;
  grid.innerHTML='';
  subs.forEach(name=>{
    const series=(SUB_FLOWS[origin]||{})[name]||[];
    const id='sub_'+name.replace(/[^a-z0-9]/gi,'_');
    flowCard('subGrid',id,name,series,color,dates,true);
  });
}

// ── Tabs & render ─────────────────────────────────────────────────────────────
function buildTabs() {
  const bar=document.getElementById('tabBar'); bar.innerHTML='';
  ['Summary',...TAB_ORIGINS].forEach(t=>{
    const el=document.createElement('div');
    el.className='tab'+(t===tab?' active':'');
    el.textContent=t;
    el.onclick=()=>{tab=t;buildTabs();render();};
    bar.appendChild(el);
  });
}

function render() {
  killAll();
  tab==='Summary'?renderSummary():renderOrigin(tab);
}

function setView(v) {
  view=v;
  ['daily','weekly','monthly'].forEach(x=>document.getElementById('btn-'+x)?.classList.toggle('active',x===v));
  render();
}

function setRange(r) {
  range=r;
  [30,180,0].forEach(x=>document.getElementById('btn-'+x)?.classList.toggle('active',x===r));
  render();
}

buildTabs(); render();
</script>
</body>
</html>
